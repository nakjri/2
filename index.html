<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Семинар</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Kaushan Script', cursive, sans-serif;
            background: linear-gradient(135deg, #fff5f9 0%, #fff9e6 100%);
            color: #7a3b59;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Декоративные элементы */
        .heart-top-left {
            position: absolute;
            top: 40px;
            left: 40px;
            font-size: 45px;
            color: #ff6b9d;
            opacity: 0.8;
        }
        .sun-bottom-right {
            position: absolute;
            bottom: 40px;
            right: 40px;
            font-size: 50px;
            color: #ffd54f;
            opacity: 0.7;
        }

        .container {
            max-width: 800px;
            width: 90%;
            text-align: center;
            padding: 60px 20px;
            z-index: 1;
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            color: #e91e63;
            margin-bottom: 50px;
            letter-spacing: 2px;
        }

        .greeting {
            font-size: 36px;
            font-weight: bold;
            color: #ff4081;
            margin-bottom: 25px;
            line-height: 1.2;
        }

        .instruction {
            font-size: 22px;
            font-weight: 500;
            color: #ffc107;
            margin-bottom: 60px;
            line-height: 1.5;
        }

        .btn {
            display: inline-block;
            padding: 20px 50px;
            background: linear-gradient(to bottom, #ffd54f, #ff4081);
            color: white;
            text-decoration: none;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 600;
            transition: all 0.4s ease;
            box-shadow: 0 10px 25px rgba(255, 64, 129, 0.3);
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.4),
                transparent
            );
            transition: left 0.8s;
            z-index: -1;
        }

        .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(255, 64, 129, 0.4);
        }

        .btn:hover::before {
            left: 100%;
        }

        footer {
            text-align: center;
            padding: 25px 20px;
            color: #ff4081;
            font-size: 14px;
            border-top: 1px solid #ffd6e7;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(5px);
            width: 100%;
            position: fixed;
            bottom: 0;
            left: 0;
        }
    </style>
</head>
<body>
    
    <div class="heart-top-left">❤️</div>
    <div class="sun-bottom-right">☀️</div>

    <div class="container">
        <div class="logo"></div>
        <h1 class="greeting">рады видеть на семинаре :)</h1>
        <p class="instruction">Чтобы продолжить, нажми кнопку</p>
        <a href="task.html" class="btn">Перейти к заданию</a>
    </div>

    <footer>© 2026</footer>
</body>
</html>
